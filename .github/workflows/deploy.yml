name: Deploy to Sepolia

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: sepolia

    steps:
      - uses: actions/checkout@v4

      - uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.6.0"

      - name: Build contracts
        run: cd contracts && scarb build

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ts-node
        run: npm install -g ts-node typescript

      - name: Install script dependencies
        run: npm install starknet dotenv

      - name: Deploy contracts
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          DEPLOYER_ADDRESS: ${{ secrets.DEPLOYER_ADDRESS }}
          RPC_URL: ${{ secrets.RPC_URL }}
          WBTC_ADDRESS: ${{ secrets.WBTC_ADDRESS }}
          USDC_ADDRESS: ${{ secrets.USDC_ADDRESS }}
        run: ts-node scripts/deploy.ts

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployments
          path: deployments/

      - name: Build frontend
        run: |
          corepack enable
          cd frontend && pnpm install --frozen-lockfile
          cp .env.local frontend/.env.local 2>/dev/null || true
          pnpm build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
